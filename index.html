<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Agentic Players Ball</title>
<meta name="description" content="The Agentic Players Ball.">
<link rel="icon" type="image/jpeg" href="agenticplayersballdiscoicon.jpg">
<meta property="og:title" content="The Agentic Players Ball">
<meta property="og:image" content="discoball-transparent.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://agenticplayersball.com">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #000;
    color: #fff;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
  }

  /* Twinkle starfield */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 20% 30%, #fff 50%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, #fff 50%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 60%, #fff 50%, transparent 100%),
      radial-gradient(1px 1px at 85% 20%, #fff 50%, transparent 100%),
      radial-gradient(1px 1px at 10% 75%, #fff 50%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 15%, #fff 50%, transparent 100%),
      radial-gradient(1px 1px at 90% 50%, #fff 50%, transparent 100%),
      radial-gradient(1px 1px at 30% 85%, #fff 50%, transparent 100%);
    animation: twinkle 4s ease-in-out infinite;
    opacity: 0.6;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 0.8; }
  }

  /* Disco glow behind the ball */
  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 90vmin;
    height: 90vmin;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #ff3d77, #ff6b3d, #ffb84d, #4dd17a,
      #4dc3ff, #b04dff, #ff3d77
    );
    filter: blur(80px);
    opacity: 0.35;
    z-index: 0;
    animation: spinGlow 18s linear infinite, pulseGlow 6s ease-in-out infinite;
  }

  @keyframes spinGlow {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  @keyframes pulseGlow {
    0%, 100% { opacity: 0.25; }
    50%      { opacity: 0.5; }
  }

  /* Ball wrapper provides the bob animation */
  .ball-wrap {
    position: relative;
    z-index: 1;
    width: min(60vmin, 560px);
    aspect-ratio: 1 / 1;
    animation: bob 5s ease-in-out infinite;
    filter: drop-shadow(0 20px 60px rgba(255, 80, 180, 0.35))
            drop-shadow(0 0 80px rgba(80, 160, 255, 0.25));
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-16px); }
  }

  /* Inner image gets the spin */
  .ball {
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: spin 28s linear infinite;
    will-change: transform;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .copy {
    position: relative;
    z-index: 1;
    margin-top: 2rem;
  }

  h1 {
    font-size: clamp(2rem, 6vmin, 4rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 0.6rem;
    background: linear-gradient(90deg, #ff3d77, #ffb84d, #4dc3ff, #b04dff, #ff3d77);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: hue 12s linear infinite;
  }

  @keyframes hue {
    from { background-position: 0% 50%; }
    to   { background-position: 300% 50%; }
  }

  .tagline {
    font-size: clamp(0.95rem, 2vmin, 1.15rem);
    color: #aaa;
    max-width: 36ch;
    margin: 0 auto;
  }

  .footer {
    position: absolute;
    bottom: 1.25rem;
    left: 0;
    right: 0;
    font-size: 0.75rem;
    color: #555;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 1;
  }

  @media (prefers-reduced-motion: reduce) {
    .ball, .ball-wrap, .glow, .stars, h1 { animation: none; }
  }
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="glow"></div>

  <div class="ball-wrap">
    <img class="ball" src="discoball-transparent.png" alt="The Agentic Players Ball">
  </div>

  <div class="copy">
    <h1>The Agentic Players Ball</h1>
    <p class="tagline">Coming soon.</p>
  </div>

  <div class="footer">agenticplayersball.com</div>
</body>
</html>
