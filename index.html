<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Agentic Players Ball</title>
<meta name="description" content="The Agentic Players Ball.">
<link rel="icon" type="image/jpeg" href="agenticplayersballdiscoicon.jpg">
<meta property="og:title" content="The Agentic Players Ball">
<meta property="og:image" content="agenticplayers.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://agenticplayersball.com">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #000;
    color: #fff;
  }

  body {
    margin: 0;
    padding: 0;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
  }

  /* Twinkle starfield */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 20% 30%, #fff 50%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, #fff 50%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 60%, #fff 50%, transparent 100%),
      radial-gradient(1px 1px at 85% 20%, #fff 50%, transparent 100%),
      radial-gradient(1px 1px at 10% 75%, #fff 50%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 15%, #fff 50%, transparent 100%),
      radial-gradient(1px 1px at 90% 50%, #fff 50%, transparent 100%),
      radial-gradient(1px 1px at 30% 85%, #fff 50%, transparent 100%);
    animation: twinkle 4s ease-in-out infinite;
    opacity: 0.6;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 0.8; }
  }

  /* Disco glow behind the ball */
  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 90vmin;
    height: 90vmin;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #ff3d77, #ff6b3d, #ffb84d, #4dd17a,
      #4dc3ff, #b04dff, #ff3d77
    );
    filter: blur(80px);
    opacity: 0.35;
    z-index: 0;
    animation: spinGlow 18s linear infinite, pulseGlow 6s ease-in-out infinite;
  }

  @keyframes spinGlow {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  @keyframes pulseGlow {
    0%, 100% { opacity: 0.25; }
    50%      { opacity: 0.5; }
  }

  /* Ball wrapper provides the bob animation */
  .ball-wrap {
    position: relative;
    z-index: 1;
    width: min(60vmin, 560px);
    aspect-ratio: 1 / 1;
    animation: bob 5s ease-in-out infinite;
    filter: drop-shadow(0 20px 60px rgba(255, 80, 180, 0.35))
            drop-shadow(0 0 80px rgba(80, 160, 255, 0.25));
  }

  /* Sparkles around the ball — 4-point stars built with two crossed gradients */
  .sparkle {
    position: absolute;
    width: 28px;
    height: 28px;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    background:
      radial-gradient(ellipse 50% 8% at 50% 50%, #fff 0%, rgba(255,255,255,0.9) 40%, transparent 70%),
      radial-gradient(ellipse 8% 50% at 50% 50%, #fff 0%, rgba(255,255,255,0.9) 40%, transparent 70%);
    filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 12px rgba(255, 200, 255, 0.6));
    animation: sparkle 3.5s ease-in-out infinite;
  }

  @keyframes sparkle {
    0%, 100% { transform: translate(-50%, -50%) scale(0)   rotate(0deg);   opacity: 0; }
    40%      { transform: translate(-50%, -50%) scale(1)   rotate(90deg);  opacity: 1; }
    60%      { transform: translate(-50%, -50%) scale(1.1) rotate(135deg); opacity: 1; }
    80%      { transform: translate(-50%, -50%) scale(0)   rotate(180deg); opacity: 0; }
  }

  .sparkle.s1  { top:  8%; left: 20%; animation-delay: 0s;    width: 24px; height: 24px; }
  .sparkle.s2  { top: 18%; left: 78%; animation-delay: 0.6s;  width: 30px; height: 30px; }
  .sparkle.s3  { top: 52%; left:  6%; animation-delay: 1.2s;  width: 22px; height: 22px; }
  .sparkle.s4  { top: 62%; left: 92%; animation-delay: 0.3s;  width: 26px; height: 26px; }
  .sparkle.s5  { top: 88%; left: 30%; animation-delay: 1.8s;  width: 20px; height: 20px; }
  .sparkle.s6  { top: 82%; left: 70%; animation-delay: 2.4s;  width: 28px; height: 28px; }
  .sparkle.s7  { top: 32%; left: 48%; animation-delay: 1.5s;  width: 16px; height: 16px; }
  .sparkle.s8  { top:  4%; left: 55%; animation-delay: 2.1s;  width: 22px; height: 22px; }
  .sparkle.s9  { top: 95%; left: 50%; animation-delay: 0.9s;  width: 18px; height: 18px; }
  .sparkle.s10 { top: 45%; left: 96%; animation-delay: 2.7s;  width: 24px; height: 24px; }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-16px); }
  }

  /* Inner image gets the spin */
  .ball {
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: spin 28s linear infinite;
    will-change: transform;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .copy {
    position: relative;
    z-index: 1;
    margin-top: 2rem;
  }

  h1 {
    font-size: clamp(2rem, 6vmin, 4rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.25;
    padding-bottom: 0.15em;
    margin-bottom: 0.6rem;
    background: linear-gradient(90deg, #ff3d77, #ffb84d, #4dc3ff, #b04dff, #ff3d77);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: hue 12s linear infinite;
  }

  @keyframes hue {
    from { background-position: 0% 50%; }
    to   { background-position: 300% 50%; }
  }

  .tagline {
    font-size: clamp(0.95rem, 2vmin, 1.15rem);
    color: #aaa;
    max-width: 36ch;
    margin: 0 auto;
  }

  .socials {
    position: absolute;
    bottom: 1.5rem;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 0.85rem;
    z-index: 1;
  }

  .socials a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    color: #888;
    transition: color 0.25s ease, transform 0.25s ease;
  }

  .socials a:hover { transform: translateY(-2px); }
  .socials a svg { width: 15px; height: 15px; fill: currentColor; }

  .socials a.x:hover        { color: #fff; }
  .socials a.tg:hover       { color: #229ED9; }

  /* Form section */
  .signup {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
    position: relative;
    z-index: 1;
  }

  .signup-card {
    width: 100%;
    max-width: 460px;
    padding: 2.5rem 2rem;
    background: rgba(15, 15, 20, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 18px;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.6),
      0 0 80px rgba(255, 80, 180, 0.08),
      0 0 120px rgba(80, 160, 255, 0.06);
  }

  .signup-card h2 {
    font-size: clamp(1.5rem, 4vmin, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.2;
    padding-bottom: 0.1em;
    margin-bottom: 0.4rem;
    text-align: center;
    background: linear-gradient(90deg, #ff3d77, #ffb84d, #4dc3ff, #b04dff, #ff3d77);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: hue 12s linear infinite;
  }

  .signup-card .lead {
    font-size: 0.95rem;
    color: #aaa;
    text-align: center;
    margin-bottom: 1.75rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    margin-bottom: 1rem;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .row .field { margin-bottom: 1rem; }

  .field label {
    font-size: 0.75rem;
    color: #888;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .field input {
    width: 100%;
    padding: 0.75rem 0.9rem;
    font-size: 0.95rem;
    color: #fff;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    font-family: inherit;
  }

  .field input::placeholder,
  .field textarea::placeholder { color: #555; }

  .field input:focus,
  .field textarea:focus {
    border-color: rgba(255, 80, 180, 0.6);
    background: rgba(255, 255, 255, 0.06);
    box-shadow: 0 0 0 3px rgba(255, 80, 180, 0.15);
  }

  .field textarea {
    width: 100%;
    padding: 0.75rem 0.9rem;
    font-size: 0.95rem;
    color: #fff;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    font-family: inherit;
    resize: vertical;
    min-height: 96px;
  }

  .submit {
    width: 100%;
    margin-top: 0.75rem;
    padding: 0.95rem 1rem;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #fff;
    background: linear-gradient(90deg, #ff3d77, #b04dff, #4dc3ff, #ff3d77);
    background-size: 300% 100%;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background-position 0.6s ease;
    font-family: inherit;
  }

  .submit:hover {
    transform: translateY(-1px);
    background-position: 100% 50%;
    box-shadow: 0 12px 28px rgba(255, 80, 180, 0.25);
  }

  .submit:active { transform: translateY(0); }

  @media (max-width: 420px) {
    .row { grid-template-columns: 1fr; }
  }

  @media (prefers-reduced-motion: reduce) {
    .ball, .ball-wrap, .glow, .stars, .sparkle, h1, .signup-card h2 { animation: none; }
    .socials a, .submit { transition: none; }
  }
</style>
</head>
<body>
  <div class="stars"></div>

  <section class="hero">
    <div class="glow"></div>

    <div class="ball-wrap">
      <img class="ball" src="agenticplayers.png" alt="The Agentic Players Ball">
      <span class="sparkle s1"></span>
      <span class="sparkle s2"></span>
      <span class="sparkle s3"></span>
      <span class="sparkle s4"></span>
      <span class="sparkle s5"></span>
      <span class="sparkle s6"></span>
      <span class="sparkle s7"></span>
      <span class="sparkle s8"></span>
      <span class="sparkle s9"></span>
      <span class="sparkle s10"></span>
    </div>

    <div class="copy">
      <h1>The Agentic Players Ball</h1>
      <p class="tagline">A playground for the agentic elite.</p>
    </div>
  </section>

  <section class="signup">
    <div class="signup-card">
      <h2>Request an invite</h2>
      <p class="lead">Tell us who you are. We will be in touch.</p>

      <form id="signup-form" autocomplete="on">
        <div class="row">
          <div class="field">
            <label for="firstName">First name</label>
            <input id="firstName" name="firstName" type="text" autocomplete="given-name" required>
          </div>
          <div class="field">
            <label for="lastName">Last name</label>
            <input id="lastName" name="lastName" type="text" autocomplete="family-name" required>
          </div>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="+1 555 123 4567" required>
        </div>

        <div class="field">
          <label for="linkedin">LinkedIn profile</label>
          <input id="linkedin" name="linkedin" type="url" autocomplete="url" placeholder="https://linkedin.com/in/yourname" required>
        </div>

        <div class="field">
          <label for="why">Why are you agentic?</label>
          <textarea id="why" name="why" rows="4" placeholder="Tell us why you consider yourself to be an Agentic elite." required></textarea>
        </div>

        <button type="submit" class="submit">Submit</button>
      </form>
    </div>
  </section>
</body>
</html>
